<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

  header{text-align:center; margin-bottom:22px;}
  .pill{display:inline-block; font-size:11px; letter-spacing:.1em; color:var(--sub); border:1px solid var(--line); background:#fff; border-radius:999px; padding:4px 13px; margin-bottom:12px;}

  header p{font-size:13.5px; color:var(--sub); margin:0;}
  .panel{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:22px 22px;}
  label{display:block; font-size:13px; font-weight:700; color:var(--green-d); margin:14px 0 6px;}
  label:first-child{margin-top:0;}
  select, input[type=text], textarea{width:100%; font-size:15px; font-family:inherit; color:var(--ink); background:#fafbf7; border:1.5px solid var(--line); border-radius:12px; padding:12px 13px;}
  select:focus, input:focus, textarea:focus{outline:none; border-color:var(--green);}
  textarea{resize:vertical; line-height:1.7;}
  .ehint{font-size:11.5px; color:var(--sub); margin-top:5px;}
  .row2{display:flex; gap:10px;}
  .row2 > div{flex:1;}
  .cats{display:flex; gap:7px; flex-wrap:wrap; margin-top:6px;}
  .chip{font-size:12.5px; font-weight:700; border:1.5px solid var(--line); background:#fafbf7; color:var(--ink); border-radius:999px; padding:8px 13px; cursor:pointer; transition:.15s;}
  .chip:hover{border-color:var(--green);}
  .chip.on{background:var(--green-soft); border-color:var(--green); color:var(--green-d);}
  #search{margin-top:6px;}
  .plist{margin-top:8px; display:flex; flex-direction:column; gap:7px; max-height:120px; overflow-y:auto; padding:2px; -webkit-overflow-scrolling:touch;}
  .pitem{font-size:14px; text-align:left; width:100%; border:1.5px solid var(--line); background:#fafbf7; border-radius:12px; padding:11px 14px; cursor:pointer; transition:.15s; color:var(--ink); font-family:inherit;}
  .pitem:hover{border-color:var(--green);}
  .pitem.on{background:var(--green-soft); border-color:var(--green); color:var(--green-d); font-weight:700;}
  .pitem .pcat{font-size:10.5px; color:var(--sub); display:block; margin-bottom:1px; font-weight:600;}
  .pempty{font-size:13px; color:var(--sub); text-align:center; padding:16px 8px;}
  .tones{display:flex; gap:8px; flex-wrap:wrap; margin-top:6px;}
  .tone{flex:1; min-width:90px; text-align:center; font-size:13px; font-weight:700; border:1.5px solid var(--line); background:#fafbf7; border-radius:11px; padding:9px 6px; cursor:pointer; transition:.15s;}
  .tone.on{background:var(--green-soft); border-color:var(--green); color:var(--green-d);}
  .gen{width:100%; margin-top:20px; background:var(--green); color:#fff; border:none; font-family:inherit; font-weight:800; font-size:16px; border-radius:999px; padding:15px; cursor:pointer; box-shadow:0 8px 20px rgba(136,168,106,.35); transition:.2s;}
  .gen:hover{background:var(--green-d);}
  .out{margin-top:22px;}
  .ocard{background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); padding:18px 18px; margin-bottom:14px;}
  .oh{display:flex; align-items:center; gap:9px; margin-bottom:10px;}
  .badge{font-size:11px; font-weight:800; border-radius:999px; padding:3px 11px;}

  .acts{margin-left:auto; display:flex; gap:7px; align-items:center;}
  .copy{font-size:12px; font-weight:700; color:#fff; background:var(--green); border:none; border-radius:9px; padding:7px 13px; cursor:pointer; font-family:inherit;}
  .copy:hover{background:var(--green-d);}
  .print{color:var(--green-d); background:var(--green-soft);}
  .print:hover{background:#d8e6c6;}

  .hint{font-size:12px; color:var(--sub); text-align:center; margin-top:6px;}
  footer{text-align:center; color:var(--sub); font-size:11.5px; margin-top:26px; line-height:1.7;}
  .empty{color:var(--sub); font-size:13.5px; text-align:center; padding:30px 10px;}
</style>
</head>
<body>
  <div class="blob" style="width:160px;height:160px;background:#f6e7a6;top:40px;left:-50px;"></div>

      <div class="row2">

        </div>
        <div>

      <textarea id="episode" rows="2" placeholder="例：宿題を前にすると固まってしまい、なかなか始められないことが続いている"></textarea>
      <div class="ehint">※その子のリアルな一言を足すと、ぐっと伝わる文章になります。</div>

      <label>⑤ トーン</label>
      <div class="tones" id="tones">
        <div class="tone on" data-t="soft">やわらかい</div>
        <div class="tone" data-t="firm">しっかり</div>
        <div class="tone" data-t="short">簡潔に</div>
      </div>

      <button class="gen" id="gen">文章をつくる ✏️</button>
      <div class="hint">🔒 入力した内容は、この端末の中だけで使われます。どこにも送信・保存されません。</div>
    </div>

    <div class="out" id="out">
      <div class="empty">困りごとを選んで「文章をつくる」を押すと、<br>3つの文面（丁寧版・1枚メモ版・話し言葉版）が出ます。</div>
    </div>

    <footer>
      ゆっくりラボ｜先生への依頼文ジェネレーター<br>
      ※この文面は下書きです。お子さんの様子に合わせて、ことばを足したり減らしたりしてお使いください。
    </footer>
  </div>

// ── 2-step picker (category chips + search + filtered list) ──
const cats = [...new Set(DATA.map(d=>d.cat))];
const catsEl = document.getElementById('cats');
const plist = document.getElementById('plist');
const search = document.getElementById('search');
let activeCat = cats[0];
let picked = -1;          // selected DATA index

cats.forEach(c=>{
  const b=document.createElement('button');
  b.type='button'; b.className='chip'+(c===activeCat?' on':''); b.textContent=c;
  b.onclick=()=>{ activeCat=c; search.value=''; renderList(); };
  catsEl.appendChild(b);
});

function renderList(){
  const q = search.value.trim();
  // highlight chip only when not searching
  [...catsEl.children].forEach(b=>b.classList.toggle('on', !q && b.textContent===activeCat));
  const items = q
    ? DATA.map((d,i)=>({i,d})).filter(o=>o.d.problem.includes(q)||o.d.cat.includes(q)||o.d.why.includes(q))
    : DATA.map((d,i)=>({i,d})).filter(o=>o.d.cat===activeCat);
  plist.innerHTML='';
  if(items.length===0){ plist.innerHTML='<div class="pempty">見つかりませんでした。別のことばで探すか、カテゴリから選んでください。</div>'; return; }
  items.forEach(({i,d})=>{
    const b=document.createElement('button');
    b.type='button'; b.className='pitem'+(i===picked?' on':'');
    b.innerHTML = (q?`<span class="pcat">${d.cat}</span>`:'') + d.problem;
    b.onclick=()=>{ picked=i; [...plist.children].forEach(x=>x.classList.remove('on')); b.classList.add('on'); };
    plist.appendChild(b);
  });
}
search.addEventListener('input', renderList);
renderList();

// tone toggle
let tone='soft';
document.querySelectorAll('.tone').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tone').forEach(x=>x.classList.remove('on'));
  t.classList.add('on'); tone=t.dataset.t;
});

function nm(){ const n=document.getElementById('name').value.trim(); return n||'うちの子'; }
function gr(){ return document.getElementById('grade').value.trim(); }
function ep(){ return document.getElementById('episode').value.trim(); }

function letterPolite(d){
  const name=nm(); const e=ep();
  const askLine = d.asks.join('、') ;
  let end;
  if(tone==='firm') end='お忙しいところ恐れ入りますが、ご配慮いただけますようお願いいたします。\nいつもありがとうございます。';
  else if(tone==='short') end='ご相談いただけますと助かります。よろしくお願いいたします。';
  else end='先生のご負担にならない範囲で構いません。難しい場合は、また一緒に考えていただけたらうれしいです。\nいつもありがとうございます。';
  const head = (tone==='short') ? '' : 'いつもお世話になっております。\n\n';
  const epLine = e ? `具体的には、${e}。\n` : '';
  const body = `${name}のことで、ひとつご相談させてください。\n\n${d.why}。\n${epLine}つきましては、${askLine}などをお願いできればと思っています。\n\n家庭でも、できることに取り組んでいきます。\n`;
  return head + body + '\n' + end;
}
function memo(d){
  const name=nm(); const g=gr()?`（${gr()}）`:''; const e=ep();
  return `■ ${name}${g} について（先生への共有メモ）\n\n`+
  `・様子：${d.why}\n`+
  (e?`・最近のできごと：${e}\n`:'')+
  `・お願いしたい配慮：\n`+ d.asks.map(a=>`　- ${a.replace(/いただく$/,'いただけると助かります')}`).join('\n') +
  `\n・無理のない範囲で構いません。家庭でも取り組みます。`;
}
function spoken(d){
  const name=nm(); const e=ep();
  const asks = d.asks.map(a=>a.replace(/いただく$/,'もらう'));
  const epLine = e ? `${e}…。\n` : '';
  return `実は${name}、${d.whyc}…。\n${epLine}もしよければ、${asks.join('、')}と助かります。\n全部でなくて大丈夫です。家でもできることはやってみますね。`;
}

function card(badge,bcls,label,text,withPrint){
  const printBtn = withPrint ? `<button class="copy print" onclick="printText(this)">🖨 印刷</button>` : '';
  return `<div class="ocard"><div class="oh"><span class="badge ${bcls}">${badge}</span><small>${label}</small>`+
  `<div class="acts">${printBtn}<button class="copy" onclick="copyText(this)">コピー</button></div></div>`+
  `<div class="text">${text.replace(/</g,'&lt;')}</div></div>`;
}
window.copyText=function(btn){
  const t=btn.closest('.ocard').querySelector('.text').innerText;
  navigator.clipboard.writeText(t).then(()=>{const o=btn.textContent;btn.textContent='✓ コピーしました';setTimeout(()=>btn.textContent=o,1500);});
};
window.printText=function(btn){
  const t=btn.closest('.ocard').querySelector('.text').innerText.replace(/</g,'&lt;');
  const w=window.open('','_blank','width=720,height=900');
  if(!w){ alert('印刷用ウィンドウを開けませんでした。ブラウザのポップアップ許可をご確認ください。'); return; }
  w.document.write('<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><title>先生への共有メモ</title>'+
  '<style>body{font-family:-apple-system,"Hiragino Maru Gothic ProN","Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;line-height:1.95;color:#2b2b2b;max-width:620px;margin:42px auto;padding:0 26px;white-space:pre-wrap;font-size:15px;}'+
  '.ft{margin-top:44px;color:#aaa;font-size:11px;border-top:1px solid #e3e3e3;padding-top:10px;}</style></head>'+
  '<body>'+t+'<div class="ft">ゆっくりラボ｜先生への依頼文ジェネレーター</div></body></html>');
  w.document.close();
  setTimeout(()=>{ w.focus(); w.print(); }, 350);
};
window.toggleMore=function(){
  const m=document.getElementById('more'); const b=document.getElementById('moreBtn');
  const open=m.style.display!=='none';
  m.style.display=open?'none':'block';
  b.textContent=open?'▼ ほかの形式も見る（メモ版・話し言葉版）':'▲ 閉じる';
};

document.getElementById('gen').onclick=()=>{
  const out = document.getElementById('out');
  if(picked<0){ out.innerHTML='<div class="empty">まず上で困りごとを1つ選んでください。</div>'; out.scrollIntoView({behavior:'smooth',block:'start'}); return; }
  const d = DATA[picked];
  out.innerHTML =
    card('A 丁寧版','b-a','連絡帳・メール用｜まずはこれ', letterPolite(d), false) +
    `<button class="moreBtn" id="moreBtn" onclick="toggleMore()">▼ ほかの形式も見る（メモ版・話し言葉版）</button>` +
    `<div id="more" style="display:none">` +
      card('B 1枚メモ版','b-b','配布・面談で渡す用（印刷できます）', memo(d), true) +
      card('C 話し言葉版','b-c','面談で口頭で言う用', spoken(d), false) +
    `</div>`;
  out.scrollIntoView({behavior:'smooth', block:'start'});
};
